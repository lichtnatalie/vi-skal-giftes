<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Natalie &amp; Rune — Save the Date</title>

<!-- Elegant serif + light sans pairing -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ==========================================================
   EDIT ME — all colors, fonts & spacing live here
   ========================================================== */
:root{
  --bg:            #f4f1ec;   /* ivory page background          */
  --card:          #faf8f4;   /* invitation card                */
  --ink:           #2b2823;   /* main text (warm near-black)    */
  --ink-soft:      #8d867b;   /* secondary text                 */
  --line:          #d9d2c6;   /* engraved border lines          */
  --btn:           #2b2823;   /* CTA button background          */
  --btn-text:      #f4f1ec;   /* CTA button text                */
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Jost', 'Helvetica Neue', sans-serif;
}

/* ---------- base ---------- */
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  /* min-height (not height) + margin:auto on the card:
     centers the invitation, but still allows scrolling to the whole
     card when the screen is shorter than the content */
  min-height:100vh;
  min-height:100svh;
  overflow:hidden;           /* fixed view — the card is scaled to always fit */
  background: radial-gradient(120% 90% at 50% 0%, #f8f5f0 0%, var(--bg) 60%, #ece7de 100%);
  font-family: var(--serif);
  color: var(--ink);
  display:flex;
  padding: 24px 16px;
  -webkit-font-smoothing: antialiased;
}

/* ---------- invitation card ---------- */
.card{
  position:relative;
  margin:auto;               /* centers + scrolls correctly on overflow */
  width:100%; max-width:400px;
  background: linear-gradient(175deg, var(--card) 0%, #f6f2ea 100%);
  border-radius:22px;
  padding: 58px 30px 40px;
  text-align:center;
  box-shadow:
    0 1px 2px rgba(60,50,35,.05),
    0 18px 45px -18px rgba(60,50,35,.22),
    inset 0 1px 0 rgba(255,255,255,.85);
  /* fade-in on load (transform is reserved for the fit-to-screen scaling) */
  opacity:0;
  animation: fadein 1.1s cubic-bezier(.22,.9,.3,1) .15s forwards;
}
@keyframes fadein{ to{ opacity:1; } }

/* engraved double border */
.card::before{
  content:""; position:absolute; inset:12px;
  border:1px solid var(--line); border-radius:14px;
  pointer-events:none;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.9), inset 0 -1px 1px rgba(60,50,35,.06);
}
.card::after{
  content:""; position:absolute; inset:17px;
  border:1px solid rgba(217,210,198,.5); border-radius:11px;
  pointer-events:none;
}

/* ---------- language toggle ---------- */
.lang{
  position:absolute; top:24px; right:26px; z-index:2;
  font-family:var(--sans); font-size:10px; letter-spacing:.16em;
  color:var(--ink-soft);
}
.lang button{
  background:none; border:none; cursor:pointer; padding:2px 3px;
  font:inherit; color:inherit; letter-spacing:inherit;
  transition:color .3s;
}
.lang button.active{ color:var(--ink); }
.lang span{ opacity:.5; }

/* ---------- monogram ---------- */
.monogram{
  width:54px; height:54px; margin:0 auto 26px;
  border:1px solid var(--line); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; letter-spacing:.08em; font-weight:500;
  color:var(--ink); background:rgba(255,255,255,.5);
  box-shadow: inset 0 1px 2px rgba(60,50,35,.05);
}

/* ---------- headings ---------- */
.eyebrow{
  font-family:var(--sans); font-weight:300;
  font-size:11px; letter-spacing:.42em; text-indent:.42em; /* balances tracking */
  color:var(--ink-soft); text-transform:uppercase;
  line-height:2; margin-bottom:18px; white-space:pre-line;
}
.names{
  font-size: clamp(38px, 11vw, 46px);
  font-weight:400; letter-spacing:.02em; line-height:1.1;
}
.names em{ font-style:italic; font-weight:300; }
.date{
  font-family:var(--sans); font-weight:300;
  font-size:12px; letter-spacing:.34em; text-indent:.34em;
  text-transform:uppercase; color:var(--ink);
  margin-top:14px;
}

/* thin rule with dot */
.rule{
  display:flex; align-items:center; gap:10px;
  margin:26px auto; width:64%;
}
.rule::before,.rule::after{ content:""; flex:1; height:1px; background:var(--line); }
.rule i{ width:4px; height:4px; border-radius:50%; background:var(--line); }

/* ---------- photo ---------- */
.photo{
  width:158px; height:158px; margin:44px auto 0;
  border-radius:50%; overflow:hidden;
  border:1px solid var(--line);
  background:rgba(255,255,255,.6);
  box-shadow: 0 10px 26px -12px rgba(60,50,35,.3);
}
.photo img{
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  object-position: 50% 12%;   /* keep faces in frame — raise/lower the % to adjust crop */
  filter:grayscale(1) contrast(1.04);   /* black & white */
  display:block;
}

/* ---------- countdown ---------- */
.countdown{
  display:flex; justify-content:center; gap:30px;
  margin:30px 0 6px;
}
.count-item .num{
  font-size:30px; font-weight:400; letter-spacing:.02em;
  font-variant-numeric: tabular-nums;
}
.count-item .lbl{
  font-family:var(--sans); font-weight:300;
  font-size:9px; letter-spacing:.3em; text-indent:.3em;
  text-transform:uppercase; color:var(--ink-soft); margin-top:3px;
}

/* ---------- CTA button ---------- */
.cta{
  margin-top:26px;
  display:inline-block;
  font-family:var(--sans); font-weight:300;
  font-size:11px; letter-spacing:.3em; text-indent:.3em;
  text-transform:uppercase;
  color:var(--btn-text); background:var(--btn);
  border:none; border-radius:999px; cursor:pointer;
  padding:16px 0; width:250px; max-width:100%;
  box-shadow: 0 8px 20px -8px rgba(43,40,35,.5);
  transition: transform .35s cubic-bezier(.22,.9,.3,1), box-shadow .35s;
}
.cta:hover{ transform:translateY(-2px); box-shadow:0 12px 26px -8px rgba(43,40,35,.55); }
.cta:active{ transform:translateY(0) scale(.98); }

/* secondary (outlined) calendar button */
.cta.ghost{
  display:block; margin:12px auto 0;
  background:transparent; color:var(--ink);
  border:1px solid var(--line); box-shadow:none;
}
.cta.ghost:hover{ transform:translateY(-2px); border-color:var(--ink-soft); }

/* hidden panel with the two calendar choices — revealed on click */
.cal-options{
  max-height:0; opacity:0; overflow:hidden;
  transform:translateY(8px);
  transition:max-height .55s cubic-bezier(.22,.9,.3,1), opacity .55s, transform .55s;
}
.cal-options.open{ max-height:160px; opacity:1; transform:none; }

/* ---------- footer ---------- */
footer{
  margin-top:32px;
  font-style:italic; font-size:14px; color:var(--ink-soft);
  letter-spacing:.04em;
}

/* small phones */
@media (max-width:360px){
  .card{ padding:52px 22px 34px; }
  .countdown{ gap:22px; }
}

/* ---------- desktop refinements ---------- */
@media (min-width:900px){
  body{
    /* softer, wider ambient light around the card */
    background:
      radial-gradient(55% 65% at 50% 42%, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 70%),
      radial-gradient(120% 90% at 50% 0%, #f8f5f0 0%, var(--bg) 60%, #e9e3d9 100%);
  }
  .card{
    max-width:470px;
    padding:70px 48px 52px;
    box-shadow:
      0 1px 2px rgba(60,50,35,.05),
      0 30px 70px -25px rgba(60,50,35,.28),
      inset 0 1px 0 rgba(255,255,255,.85);
  }
  .monogram{ width:60px; height:60px; font-size:17px; }
  .names{ font-size:52px; }
  .date{ font-size:13px; margin-top:16px; }
  .photo{ width:190px; height:190px; }
  .countdown{ gap:40px; }
  .count-item .num{ font-size:34px; }
  footer{ margin-top:38px; }
}

/* desktop with a short viewport (typical laptops):
   compact vertical spacing so the whole card fits without scrolling */
@media (min-width:900px) and (max-height:920px){
  body{ padding:16px; }
  .card{ max-width:440px; padding:42px 42px 32px; }
  .monogram{ width:48px; height:48px; margin-bottom:16px; font-size:14px; }
  .eyebrow{ margin-bottom:12px; }
  .names{ font-size:42px; }
  .date{ margin-top:10px; }
  .rule{ margin:18px auto; }
  .photo{ width:150px; height:150px; margin-top:18px; }
  .countdown{ margin:20px 0 4px; gap:32px; }
  .count-item .num{ font-size:27px; }
  .cta{ margin-top:16px; padding:14px 0; }
  footer{ margin-top:20px; }
}
</style>
</head>

  <!-- Countdown -->
  <div class="countdown" role="timer">
    <div class="count-item"><div class="num" id="cd-days">–</div><div class="lbl" data-i18n="days">Dage</div></div>
    <div class="count-item"><div class="num" id="cd-hours">–</div><div class="lbl" data-i18n="hours">Timer</div></div>
    <div class="count-item"><div class="num" id="cd-mins">–</div><div class="lbl" data-i18n="mins">Min</div></div>
  </div>

  <!-- CTA: one button that reveals the two calendar choices -->
  <button class="cta" onclick="toggleCalOptions()" data-i18n="cta">Føj til kalender</button>
  <div class="cal-options" id="cal-options">
    <button class="cta ghost" onclick="openCalendar()" data-i18n="ctaGoogle">Google Kalender</button>
    <button class="cta ghost" onclick="downloadICS()" data-i18n="ctaApple">Apple Kalender</button>
  </div>

  <footer data-i18n="footer">Mere information følger</footer>
</main>

<script>
/* ==========================================================
   EDIT ME — wedding details
   ========================================================== */
const WEDDING = {
  names: "Natalie & Rune",
  // Local time of the ceremony (year, monthIndex 0-based, day, hour, min)
  date: new Date(2027, 7, 14, 16, 0),
  durationHours: 6,
  location: "Følger senere",
  description: "Save the date — Natalie & Rune skal giftes!"
};

/* ---------- translations ---------- */
const I18N = {
  da: { header:"VI SKAL\nGIFTES", date:"14. august 2027",
        days:"Dage", hours:"Timer", mins:"Min",
        cta:"Føj til kalender",
        ctaGoogle:"Google Kalender", ctaApple:"Apple Kalender",
        footer:"Mere information følger" },
  en: { header:"WE ARE\nGETTING MARRIED", date:"14 August 2027",
        days:"Days", hours:"Hours", mins:"Mins",
        cta:"Add to Calendar",
        ctaGoogle:"Google Calendar", ctaApple:"Apple Calendar",
        footer:"More information to follow" }
};

function setLang(lang){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = I18N[lang][el.dataset.i18n];
  });
  document.getElementById("btn-da").classList.toggle("active", lang==="da");
  document.getElementById("btn-en").classList.toggle("active", lang==="en");
}

/* ---------- live countdown ---------- */
const $d = document.getElementById("cd-days"),
      $h = document.getElementById("cd-hours"),
      $m = document.getElementById("cd-mins");

function tick(){
  const diff = Math.max(0, WEDDING.date - Date.now());
  $d.textContent = Math.floor(diff / 864e5);                 // days
  $h.textContent = String(Math.floor(diff / 36e5) % 24).padStart(2,"0");
  $m.textContent = String(Math.floor(diff / 6e4)  % 60).padStart(2,"0");
}
tick();
setInterval(tick, 1000);

/* ---------- add to calendar ----------
   Opens Google Calendar with the event pre-filled — no file download.
   Works the same in every browser, including Messenger/Instagram. */
function toICSDate(d){ // UTC format: YYYYMMDDTHHMMSSZ
  return d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");
}
function openCalendar(){
  const start = WEDDING.date;
  const end   = new Date(start.getTime() + WEDDING.durationHours * 36e5);
  const url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text="     + encodeURIComponent("Bryllup — " + WEDDING.names)
    + "&dates="    + toICSDate(start) + "/" + toICSDate(end)
    + "&details="  + encodeURIComponent(WEDDING.description)
    + "&location=" + encodeURIComponent(WEDDING.location);
  window.open(url, "_blank");
}

/* Reveal / hide the two calendar choices */
function toggleCalOptions(){
  document.getElementById("cal-options").classList.toggle("open");
  setTimeout(fitCard, 580); // re-fit after the reveal animation
}

/* ---------- fit-to-screen ----------
   Scales the card down just enough that the whole frame is always
   visible inside the window — no scrolling, on any screen. */
function fitCard(){
  const c = document.querySelector(".card");
  c.style.transform = "";                    // reset before measuring
  const m  = 14;                             // breathing room around the card
  const r  = c.getBoundingClientRect();
  const s  = Math.min(1, (innerHeight - m*2) / r.height, (innerWidth - m*2) / r.width);
  if (s < 1){
    c.style.transformOrigin = "top center";
    c.style.transform = "translateY(" + (((innerHeight - r.height*s)/2) - r.top) + "px) scale(" + s + ")";
  }
}
addEventListener("resize", fitCard);
addEventListener("load", fitCard);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitCard);
fitCard();

/* Apple Calendar.
   In-app browsers (Messenger/Instagram) block file downloads, so there we
   use a webcal:// link to the hosted bryllup.ics — a special scheme the
   phone hands straight to the Calendar app, bypassing the browser.
   Requires the page to be hosted (e.g. Netlify) with bryllup.ics beside it. */
function isInAppBrowser(){
  return /FBAN|FBAV|FB_IAB|Messenger|Instagram|Line\//i.test(navigator.userAgent||"");
}
function downloadICS(){
  if (isInAppBrowser() && location.protocol.startsWith("http")){
    location.href = "webcal://" + location.host + "/bryllup.ics";
    return;
  }
  const start = WEDDING.date;
  const end   = new Date(start.getTime() + WEDDING.durationHours * 36e5);
  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//SaveTheDate//DA",
    "BEGIN:VEVENT",
    "UID:" + Date.now() + "@savethedate",
    "DTSTAMP:" + toICSDate(new Date()),
    "DTSTART:" + toICSDate(start),
    "DTEND:"   + toICSDate(end),
    "SUMMARY:Bryllup — " + WEDDING.names,
    "DESCRIPTION:" + WEDDING.description,
    "LOCATION:" + WEDDING.location,
    "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics], { type:"text/calendar;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "natalie-og-rune-bryllup.ics";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}
</script>
